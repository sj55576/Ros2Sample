services:
  ros2sample:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-lyrical}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-resolute}
    image: ros2sample:${ROS_DISTRO:-lyrical}
    working_dir: /workspace/Ros2Sample
    volumes:
      - ..:/workspace/Ros2Sample:cached
    environment:
      ROS_DISTRO: ${ROS_DISTRO:-lyrical}
    command: bash -lc "source /opt/ros/${ROS_DISTRO:-lyrical}/setup.bash && bash"
    tty: true
    stdin_open: true
