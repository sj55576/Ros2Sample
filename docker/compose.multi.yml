services:
  robot_alpha:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-lyrical}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-resolute}
    image: ros2sample:${ROS_DISTRO:-lyrical}
    working_dir: /workspace/Ros2Sample
    volumes:
      - ..:/workspace/Ros2Sample:cached
    environment:
      ROS_DISTRO: ${ROS_DISTRO:-lyrical}
      ROS_DOMAIN_ID: 1
    command: bash -lc "source /opt/ros/$${ROS_DISTRO:-lyrical}/setup.bash && source install/setup.bash && ros2 launch ground_robot_sim multi_robot.launch.py"
    tty: true
    stdin_open: true
    networks:
      - rosnet

  robot_beta:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-lyrical}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-resolute}
    image: ros2sample:${ROS_DISTRO:-lyrical}
    working_dir: /workspace/Ros2Sample
    volumes:
      - ..:/workspace/Ros2Sample:cached
    environment:
      ROS_DISTRO: ${ROS_DISTRO:-lyrical}
      ROS_DOMAIN_ID: 1
    command: bash -lc "source /opt/ros/$${ROS_DISTRO:-lyrical}/setup.bash && source install/setup.bash && ros2 launch drone_sim swarm.launch.py drone_count:=2"
    tty: true
    stdin_open: true
    networks:
      - rosnet

  robot_gamma:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: ${ROS_DISTRO:-lyrical}
        UBUNTU_CODENAME: ${UBUNTU_CODENAME:-resolute}
    image: ros2sample:${ROS_DISTRO:-lyrical}
    working_dir: /workspace/Ros2Sample
    volumes:
      - ..:/workspace/Ros2Sample:cached
    environment:
      ROS_DISTRO: ${ROS_DISTRO:-lyrical}
      ROS_DOMAIN_ID: 2
    command: bash -lc "source /opt/ros/$${ROS_DISTRO:-lyrical}/setup.bash && source install/setup.bash && ros2 launch drone_sim swarm.launch.py drone_count:=2"
    tty: true
    stdin_open: true
    networks:
      - rosnet

networks:
  rosnet:
    driver: bridge
