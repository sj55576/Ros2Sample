manipulator_simulator:
  ros__parameters:
    frame_id: base_link
    link1_frame_id: link1
    link2_frame_id: link2
    tool_frame_id: tool0
    joint_names: [joint1, joint2]
    link_lengths: [0.8, 0.6]
    initial_joint_positions: [0.0, 0.0]
    max_joint_speed: 1.2
    publish_rate_hz: 30.0

moveit_trajectory_bridge:
  ros__parameters:
    joint_names: [joint1, joint2]
    input_topic: planned_joint_trajectory
    output_topic: joint_target
    publish_rate_hz: 30.0
    loop_trajectory: false
    hold_last_point: true
