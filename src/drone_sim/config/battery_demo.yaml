sim_drone:
  ros__parameters:
    publish_rate_hz: 50.0
    max_linear_speed: 4.0
    cmd_timeout_sec: 0.8

waypoint_commander:
  ros__parameters:
    waypoints: [0.0, 0.0, 1.0, 2.0, 0.0, 1.5, 2.0, 2.0, 1.0, 0.0, 2.0, 1.2, 0.0, 0.0, 1.0]
    tolerance_m: 0.25
    hold_time_sec: 1.0
    loop: true

battery_monitor:
  ros__parameters:
    capacity_wh: 50.0
    idle_power_w: 5.0
    motor_power_w: 80.0
    critical_pct: 15.0
    publish_rate_hz: 2.0

emergency_land:
  ros__parameters:
    descent_speed: 0.5
    publish_rate_hz: 20.0
