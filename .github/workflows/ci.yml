name: ROS 2 CI

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "ros2.repos"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "ros2.repos"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:
    name: Ubuntu ${{ matrix.os }} / ROS 2 ${{ matrix.ros_distro }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            ros_distro: jazzy
    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up ROS 2 apt repository
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.ros_distro }}

      - name: Install developer tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-vcstool

      - name: Cache rosdep
        uses: actions/cache@v4
        with:
          path: ~/.ros/rosdep
          key: rosdep-${{ matrix.os }}-${{ matrix.ros_distro }}-${{ hashFiles('src/**/package.xml') }}
          restore-keys: |
            rosdep-${{ matrix.os }}-${{ matrix.ros_distro }}-

      - name: Import vcs dependencies
        run: |
          mkdir -p src
          vcs import src < ros2.repos

      - name: Install ROS dependencies
        run: ./scripts/rosdep-install.sh ${{ matrix.ros_distro }}

      - name: Build
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          ./scripts/build.sh

      - name: Lint
        run: |
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          ./scripts/lint.sh

      - name: Test
        run: |
          set -o pipefail
          export AMENT_TRACE_SETUP_FILES="${AMENT_TRACE_SETUP_FILES:-}"
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon test --event-handlers console_direct+
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          colcon test-result --verbose 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
