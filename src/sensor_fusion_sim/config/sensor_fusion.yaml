noisy_sensor_node:
  ros__parameters:
    circle_radius: 5.0
    circle_omega: 0.3
    gps_rate_hz: 1.0
    gps_noise_stddev: 0.5
    imu_rate_hz: 50.0
    imu_accel_stddev: 0.1
    imu_gyro_stddev: 0.02
    odom_rate_hz: 10.0
    odom_noise_stddev: 0.05
    frame_id: "world"
    base_frame_id: "base_link"

complementary_filter:
  ros__parameters:
    gps_alpha: 0.15
    odom_alpha: 0.30
    publish_rate_hz: 20.0
    frame_id: "world"
    child_frame_id: "base_link_fused"
    imu_yaw_weight: 0.05

ekf_node:
  ros__parameters:
    publish_rate_hz: 20.0
    frame_id: "world"
    child_frame_id: "base_link_ekf"
    use_imu_orientation: true
    process_pos_stddev: 0.01
    process_yaw_stddev: 0.01
    process_vel_stddev: 0.1
    process_yaw_rate_stddev: 0.05
    gps_pos_stddev: 0.5
    odom_pos_stddev: 0.05
    odom_vel_stddev: 0.1
    imu_gyro_stddev: 0.02
    imu_yaw_stddev: 0.01
    init_pos_stddev: 1.0
    init_yaw_stddev: 0.5
    init_vel_stddev: 0.5
    init_yaw_rate_stddev: 0.1

lifecycle_data_recorder:
  ros__parameters:
    max_buffer_size: 500
    publish_rate_hz: 1.0
    input_topic: "fused_odom"
